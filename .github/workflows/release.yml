# name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build Windows App
        run: wails build -platform=windows/amd64
        env:
          CGO_ENABLED: 1

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/bin/*.exe
          retention-days: 5

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build macOS App
        run: wails build -platform=darwin/universal
        env:
          CGO_ENABLED: 1

      - name: Package macOS App as ZIP
        run: |
          cd build/bin
          # Find the .app bundle and create a ZIP
          APP_NAME=$(ls -d *.app | head -1)
          zip -r "${APP_NAME%.app}-macOS-universal.zip" "$APP_NAME"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: build/bin/*.zip
          retention-days: 5

  build-api-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build Linux API Server
        run: |
          cd api-server
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o auth-api-linux -ldflags '-s -w'
        run: |
          cd api-server
          GOOS=linux GOARCH=amd64 go build -o auth-api-linux

      - name: Build Windows API Server
        run: |
          cd api-server
          GOOS=windows GOARCH=amd64 go build -o auth-api-windows.exe

      - name: Upload Linux API Server
        uses: actions/upload-artifact@v4
        with:
          name: api-server-linux
          path: api-server/auth-api-linux
          retention-days: 5

      - name: Upload Windows API Server
        uses: actions/upload-artifact@v4
        with:
          name: api-server-windows
          path: api-server/auth-api-windows.exe
          retention-days: 5

  release:
    needs: [build-windows, build-macos, build-api-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Create Release Directory
        run: mkdir -p release

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: release

      - name: Download Linux API Server
        uses: actions/download-artifact@v4
        with:
          name: api-server-linux
          path: release

      - name: Download Windows API Server
        uses: actions/download-artifact@v4
        with:
          name: api-server-windows
          path: release

      - name: List Release Files
        run: ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
